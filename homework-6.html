<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session 2 - Homework</title>
    <style>
      label,
      input,
      textarea,
      fieldset {
        margin: 4px;
      }
    </style>
  </head>
  <body>
    <h3>Hồ sơ thông tin cá nhân</h3>
    <fieldset>
      <legend>Thông tin cá nhân</legend>
      <label for="name">Tên:</label>
      <input type="text" id="name" placeholder="Nhập họ và tên..." /><br />
      <label for="birthday">Ngày sinh:</label>
      <input type="date" id="birthday" />
    </fieldset>

    <fieldset>
      <legend>Thông tin liên hệ</legend>
      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="example@email.com" /> <br />
      <label for="tel">Số điện thoại:</label>
      <input type="tel" id="tel" placeholder="0912345678" />
    </fieldset>

    <label for="note">Ghi chú bổ sung:</label><br />
    <textarea
      cols="50"
      rows="5"
      placeholder="Nhập ghi chú của bạn tại đây..."
    ></textarea>
    <br />

    <input type="submit" value="Lưu hồ sơ" />
  </body>
</html>
