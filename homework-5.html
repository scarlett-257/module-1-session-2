<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session 2 - Homework</title>
  </head>
  <body>
    <h3>Khảo sát dịch vụ khách hàng</h3>
    <form>
      <label for="age">Độ tuổi của bạn:</label>
      <input type="number" id="age" />

      <fieldset>
        <label for="gender">Giới tính của bạn là gì?</label><br />
        <input type="radio" id="gender" name="gender" value="Male" />Nam
        <input type="radio" id="gender" name="gender" value="Female" />Nữ
        <input type="radio" id="gender" name="gender" value="Other" />Khác
      </fieldset>
      <fieldset>
        <label for="service"
          >Dịch vụ bạn đang quan tâm (có thể chọn nhiều):</label
        ><br />
        <input
          type="checkbox"
          id="service"
          name="service"
          value="website"
        />Website
        <input type="checkbox" id="service" name="service" value="app" />Mobile
        App
        <input
          type="checkbox"
          id="service"
          name="service"
          value="marketing"
        />Marketing
      </fieldset>

      <label for="country">Quốc gia đang sinh sống:</label>
      <select id="country">
        <option value="Vietnam">Việt Nam</option>
        <option value="Japan">Nhật Bản</option>
        <option value="USA">Hoa Kỳ</option>
      </select>
      <br />

      <input type="submit" value="Gửi thông tin" />
    </form>
  </body>
</html>
