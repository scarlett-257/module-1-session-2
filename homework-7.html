<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session 2 - Homework</title>
    <style>
      table,
      tr,
      th,
      td {
        border: 1px solid black;
        border-collapse: collapse;
      }

      td,
      th {
        padding: 2px;
      }
    </style>
  </head>
  <body>
    <h2>Báo Cáo Tài Chính Năm</h2>
    <table>
      <caption>
        Báo cáo doanh thu và lợi nhuận các quý trong năm
      </caption>
      <thead>
        <tr>
          <th scope="col">Chỉ tiêu</th>
          <th scope="col">Quý 1</th>
          <th scope="col">Quý 2</th>
          <th scope="col">Quý 3</th>
          <th scope="col">Quý 4</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td scope="row">Doanh thu (Tỷ VNĐ)</td>
          <td>500</td>
          <td>650</td>
          <td>700</td>
          <td>850</td>
        </tr>
        <tr>
          <td scope="row">Lợi nhuận (Tỷ VNĐ)</td>
          <td>120</td>
          <td>180</td>
          <td>210</td>
          <td>250</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
